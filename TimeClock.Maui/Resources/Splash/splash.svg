<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
    <!-- Machine body -->
    <path d="M 80 100 L 320 100 A 40 40 0 0 1 360 140 L 360 280 A 40 40 0 0 1 320 320 L 80 320 A 40 40 0 0 1 40 280 L 40 140 A 40 40 0 0 1 80 100 Z" fill="#6d4aff"/>

    <!-- Inner faceplate (lighter purple) -->
    <path d="M 90 120 L 310 120 A 30 30 0 0 1 340 150 L 340 270 A 30 30 0 0 1 310 300 L 90 300 A 30 30 0 0 1 60 270 L 60 150 A 30 30 0 0 1 90 120 Z" fill="#cbbdfd"/>

    <!-- Digital display screen -->
    <rect x="100" y="140" width="180" height="70" rx="10" fill="#4a3a8a"/>
    <text x="190" y="185" font-family="Arial" font-size="24" fill="#ffffff" text-anchor="middle" font-weight="bold">12:34</text>

    <!-- Time card slot -->
    <rect x="80" y="240" width="200" height="40" rx="5" fill="#6d4aff"/>

    <!-- Time card inserted -->
    <g>
        <!-- Card background -->
        <rect x="130" y="80" width="100" height="120" rx="5" fill="#ffffff" stroke="#4a3a8a" stroke-width="3"/>
        <!-- Name field box -->
        <rect x="145" y="95" width="30" height="30" rx="2" fill="#6d4aff"/>
        <!-- Timestamp lines -->
        <line x1="185" y1="105" x2="215" y2="105" stroke="#6d4aff" stroke-width="2"/>
        <line x1="185" y1="120" x2="215" y2="120" stroke="#6d4aff" stroke-width="2"/>
        <line x1="185" y1="135" x2="215" y2="135" stroke="#6d4aff" stroke-width="2"/>
        <line x1="185" y1="150" x2="215" y2="150" stroke="#6d4aff" stroke-width="2"/>
    </g>

    <!-- Green punch button -->
    <circle cx="280" cy="240" r="25" fill="#4ecdc4" stroke="#2a9d8f" stroke-width="3"/>
    <text x="280" y="247" font-family="Arial" font-size="16" fill="#ffffff" text-anchor="middle" font-weight="bold">✓</text>
</svg>
